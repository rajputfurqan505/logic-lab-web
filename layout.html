<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Complete Layout</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* تھوڑی سی کسٹم ڈیزائننگ تاکہ ڈبے واضح نظر آئیں */
        .box {
            padding: 20px;
            border: 1px solid #dee2e6;
            text-align: center;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container mt-5">
        <h2 class="text-center mb-5">Bootstrap Layout (Final Activity)</h2>

        <div class="row">
            <div class="col-12">
                <div class="box bg-primary">Full Width (col-12)</div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-6">
                <div class="box bg-secondary">Column 1 (col-md-6)</div>
            </div>
            <div class="col-md-6">
                <div class="box bg-secondary">Column 2 (col-md-6)</div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-4">
                <div class="box bg-success">Column A (col-md-4)</div>
            </div>
            <div class="col-md-4">
                <div class="box bg-danger">Column B (col-md-4)</div>
            </div>
            <div class="col-md-4">
                <div class="box bg-info text-dark">Column C (col-md-4)</div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-8">
                <div class="box bg-warning text-dark">Main Content Area (col-md-8)</div>
            </div>
            <div class="col-md-4">
                <div class="box bg-dark">Sidebar (col-md-4)</div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-4 offset-md-4">
                <div class="box bg-info text-dark">Centered with Offset</div>
            </div>
        </div>

    </div>
    </body>
   </html>
